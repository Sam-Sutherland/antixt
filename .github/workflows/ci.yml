name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Check formatting
        run: |
          cargo fmt --manifest-path antixt/Cargo.toml -- --check
          cargo fmt --manifest-path docs/Cargo.toml -- --check
      - name: Lint framework
        run: cargo clippy --manifest-path antixt/Cargo.toml --all-targets -- -D warnings
      - name: Test framework
        run: cargo test --manifest-path antixt/Cargo.toml
      - name: Check documentation app
        run: cargo clippy --manifest-path docs/Cargo.toml --all-targets -- -D warnings
      - name: Verify storefront fixture
        run: node benchmark/antixt-storefront.mjs --verify
